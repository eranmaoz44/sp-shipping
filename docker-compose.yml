services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  frontend:
    build:
      context: ./apps/frontend
    env_file:
      - ./apps/frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - api
